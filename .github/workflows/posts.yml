name: Telegram Posts

on:
  schedule:
    - cron: "10 5 * * 1,3,5"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send post
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: "@webstudio_chanel"
        run: |
          python3 << 'PYEOF'
          import json, os, datetime, urllib.request, urllib.error
          with open('.github/scripts/posts.json') as f:
              posts = json.load(f)
          day = datetime.datetime.now().weekday()
          day_offset = {0:0, 2:1, 4:2}.get(day, 0)
          week = datetime.datetime.now().isocalendar()[1]
          total = len(posts)
          idx = (week * 3 + day_offset) % total
          post = posts[idx]
          text = post[2] if isinstance(post, list) else post
          token = os.environ['TOKEN']
          chat_id = os.environ['CHAT_ID']
          data = json.dumps({'chat_id': chat_id, 'parse_mode': 'HTML', 'text': text})
          req = urllib.request.Request(
              f'https://api.telegram.org/bot{token}/sendMessage',
              data=data.encode(),
              headers={'Content-Type': 'application/json'}
          )
          try:
              resp = urllib.request.urlopen(req)
              print(f'Sent post {idx}: {post[1]}')
              print(f'Response: {resp.read().decode()}')
          except urllib.error.HTTPError as e:
              print(f'HTTP {e.code}: {e.read().decode()}')
              raise
          PYEOF
name: Telegram Posts

on:
  schedule:
    - cron: "0 5 * * 1,3,5,6"  # Mon, Wed, Fri, Sat at 08:00 MSK (05:00 UTC)
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate and send post
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHAT_ID: "@webstudio_chanel"
        run: python .github/scripts/post-generator.py

name: Bot Worker

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  bot-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run bot worker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: |
          cd .github/scripts
          pip install -r requirements.txt
          python worker.py
      - name: Commit offset
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git add .github/scripts/offset.txt
          git diff --cached --quiet || (
            git config user.name "bot-worker"
            git config user.email "bot@uriy-as.org"
            git commit -m "Update offset"
            echo "$GH_TOKEN" | gh auth login --with-token 2>/dev/null
            gh api repos/uriy-as/uriy-as.github.io/git/refs/heads/main --method PATCH -f sha=$(git rev-parse HEAD) 2>/dev/null || git push
          )
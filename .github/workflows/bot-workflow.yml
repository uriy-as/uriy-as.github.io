name: Bot Worker

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  bot-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run bot worker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd .github/scripts
          pip install -r requirements.txt
          python worker.py
      - name: Commit offset
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "bot-worker"
          git config user.email "bot@uriy-as.org"
          git add .github/scripts/offset.txt
          git diff --cached --quiet || (git commit -m "Update offset" && git push "https://x-access-token:${GH_TOKEN}@github.com/uriy-as/uriy-as.github.io.git" HEAD:main)
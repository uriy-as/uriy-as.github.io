name: Telegram Posts

on:
  schedule:
    - cron: "10 5 * * 1,3,5"  # Mon, Wed, Fri at 08:10 MSK (05:10 UTC)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send post
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "@webstudio_chanel"
        run: |
          BODY=$(cat .github/scripts/posts.json)
          JSON=$(echo "$BODY" | python3 -c "
import json, sys, datetime
posts = json.load(sys.stdin)
day = datetime.datetime.now().weekday()
idx = {0:0, 2:1, 4:2}.get(day, 0)
post = posts[idx] if idx < len(posts) else posts[0]
print(json.dumps({'chat_id': '$CHAT_ID', 'parse_mode': 'HTML', 'text': post}))
          ")
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON"
